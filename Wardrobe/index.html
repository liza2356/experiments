<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="closet.">
  <title>closet.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:   #131311;
      --stone: #93989b;
      --terra: #e45a33;
      --sand:  #eeeae7;
      --white: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--sand);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    .header {
      padding: 48px 20px 4px;
    }

    .header h1 {
      font-family: 'Caveat', cursive;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
    }

    /* ── CONTENT ── */
    .content {
      padding: 18px 16px 110px;
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    /* ── SECTION TITLES ── */
    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--stone);
      margin-bottom: 12px;
    }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-card {
      background: var(--white);
      border-radius: 14px;
      padding: 18px 16px;
      box-shadow: 0 2px 10px rgba(19,19,17,0.06);
    }

    .stat-num {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--terra);
      line-height: 1;
      letter-spacing: -1px;
    }

    .stat-lbl {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--stone);
      margin-top: 5px;
      letter-spacing: 0.3px;
    }

    /* ── CATEGORY GRID ── */
    .cats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .cat-item {
      background: var(--white);
      border-radius: 8px;
      padding: 16px 8px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      box-shadow: 0 1px 6px rgba(19,19,17,0.06);
      transition: transform 0.13s;
    }

    .cat-item:active { transform: scale(0.95); }

    .cat-item svg {
      width: 28px;
      height: 28px;
      color: var(--ink);
      flex-shrink: 0;
    }

    .cat-item-label {
      font-size: 0.67rem;
      font-weight: 600;
      color: var(--ink);
      text-align: center;
      line-height: 1.2;
    }

    .cat-item-count {
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--stone);
      line-height: 1;
    }

    /* ── ADD ITEM BUTTON ── */
    .add-wrap {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      padding: 12px 16px 36px;
      background: rgba(238,234,231,0.88);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border-top: 1px solid rgba(19,19,17,0.07);
      z-index: 10;
    }

    .add-btn {
      width: 100%;
      padding: 15px;
      background: var(--ink);
      color: var(--white);
      border: none;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.2px;
      transition: opacity 0.13s;
    }
    .add-btn:active { opacity: 0.75; }

    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    /* ── CATEGORY SCROLL PILLS (inside add modal) ── */
    .am-cat-scroll {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding: 0 18px 4px;
      margin-bottom: 14px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .am-cat-scroll::-webkit-scrollbar { display: none; }
    .am-cat-scroll .am-pill { white-space: nowrap; flex-shrink: 0; }

    /* ── ADD ITEM MODAL ── */
    .add-modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 300;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .add-modal-backdrop.open { display: flex; }

    .add-modal-sheet {
      background: var(--white);
      border-radius: 22px 22px 0 0;
      width: 100%; max-width: 480px;
      max-height: 92vh;
      overflow-y: auto;
      padding-bottom: 40px;
      animation: slideUp 0.22s ease;
    }

    .am-handle {
      width: 36px; height: 4px;
      background: #ddd; border-radius: 2px;
      margin: 12px auto 0;
    }

    .am-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 14px 18px 10px;
    }

    .am-cat-tag {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--stone);
      margin-bottom: 2px;
    }

    .am-title { font-size: 1rem; font-weight: 800; color: var(--ink); }

    .am-close {
      background: #f0eeee; border: none; border-radius: 50%;
      width: 30px; height: 30px;
      font-size: 0.9rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--ink); font-family: inherit; flex-shrink: 0;
    }

    .am-photo-zone {
      margin: 0 18px 14px;
      height: 170px;
      border-radius: 14px;
      background: #f5f3f1;
      border: 2px dashed #d0ccc8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
    }
    .am-photo-zone img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .am-photo-icon { font-size: 2rem; }
    .am-photo-label { font-size: 0.72rem; color: var(--stone); font-weight: 600; margin-top: 8px; }

    .am-row { padding: 0 18px; margin-bottom: 12px; }
    .am-label {
      font-size: 0.62rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--stone); margin-bottom: 6px;
    }
    .am-input {
      width: 100%; background: #f5f3f1;
      border: none; border-radius: 10px;
      padding: 11px 13px;
      font-size: 0.88rem; color: var(--ink);
      font-family: inherit; outline: none; resize: none;
    }
    .am-input:focus { background: #ece8e4; }

    .am-pills {
      display: flex; gap: 7px; flex-wrap: wrap;
      padding: 0 18px; margin-bottom: 14px;
    }
    .am-pill {
      background: #f5f3f1; border: none;
      border-radius: 20px; padding: 6px 13px;
      font-size: 0.7rem; font-weight: 600;
      color: var(--ink); cursor: pointer;
      font-family: inherit; transition: background 0.12s;
    }
    .am-pill.selected { background: var(--ink); color: white; }

    .am-swatches {
      display: flex; gap: 8px; flex-wrap: wrap;
      padding: 0 18px; margin-bottom: 14px;
    }
    .am-swatch {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2.5px solid transparent;
      cursor: pointer; transition: transform 0.12s;
    }
    .am-swatch.selected { border-color: var(--ink); transform: scale(1.15); }

    .am-save {
      margin: 8px 18px 0;
      width: calc(100% - 36px);
      padding: 14px; background: var(--ink);
      color: white; border: none;
      border-radius: 12px;
      font-size: 0.92rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>closet.</h1>
  </div>

  <div class="content">

    <!-- STATS -->
    <section>
      <div class="section-title">My Wardrobe</div>
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num" id="total-items">0</div>
          <div class="stat-lbl">Total Items</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">0</div>
          <div class="stat-lbl">Outfits</div>
        </div>
      </div>
    </section>

    <!-- CATEGORIES -->
    <section>
      <div class="section-title">Browse by category</div>
      <div class="cats-grid">

        <a class="cat-item" href="category.html?cat=tops">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3c1 2 2.5 2.5 4 2.5S15 5 16 3l4 4-3 2.5V21H7V9.5L4 7l4-4z"/>
          </svg>
          <span class="cat-item-label">Tops</span>
          <span class="cat-item-count" id="count-tops">0</span>
        </a>

        <a class="cat-item" href="category.html?cat=bottoms">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 3h14v8l-4 10h-2.5L12 14l-.5 7H9L5 11V3z"/>
            <line x1="5" y1="7" x2="19" y2="7"/>
          </svg>
          <span class="cat-item-label">Bottoms</span>
          <span class="cat-item-count" id="count-bottoms">0</span>
        </a>

        <a class="cat-item" href="category.html?cat=dresses">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 2h4v5l5 14H5l5-14V2z"/>
            <line x1="10" y1="2" x2="10" y2="7"/>
            <line x1="14" y1="2" x2="14" y2="7"/>
            <line x1="9" y1="9" x2="15" y2="9"/>
          </svg>
          <span class="cat-item-label">Dresses</span>
          <span class="cat-item-count" id="count-dresses">0</span>
        </a>

        <a class="cat-item" href="category.html?cat=jackets">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 7l4-4 3 4 1-2 1 2 3-4 4 4-2 3V21H6V10L4 7z"/>
            <line x1="12" y1="5" x2="12" y2="16"/>
          </svg>
          <span class="cat-item-label">Jackets</span>
          <span class="cat-item-count" id="count-jackets">0</span>
        </a>

        <a class="cat-item" href="category.html?cat=bags">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="9" width="14" height="12" rx="2"/>
            <path d="M9 9C9 7 10 5 12 5s3 2 3 4"/>
          </svg>
          <span class="cat-item-label">Bags</span>
          <span class="cat-item-count" id="count-bags">0</span>
        </a>

        <a class="cat-item" href="category.html?cat=shoes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 16Q3 10 9 9h7Q21 9 21 13v3Q13.5 18 3 16z"/>
            <line x1="2" y1="16" x2="22" y2="16"/>
            <path d="M9 9V7h4v2"/>
          </svg>
          <span class="cat-item-label">Shoes</span>
          <span class="cat-item-count" id="count-shoes">0</span>
        </a>

        <a class="cat-item" href="category.html?cat=activewear">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13.5 2L8 13h4L9.5 22 17 11h-4.5L13.5 2z"/>
          </svg>
          <span class="cat-item-label">Activewear</span>
          <span class="cat-item-count" id="count-activewear">0</span>
        </a>

        <a class="cat-item" href="category.html?cat=swimwear">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6.5 6Q12 3 17.5 6l-1 5h-10l-1-5z"/>
            <path d="M7.5 15Q12 12.5 16.5 15l-1 5.5h-8L7.5 15z"/>
            <line x1="7.5" y1="11" x2="7.5" y2="15"/>
            <line x1="16.5" y1="11" x2="16.5" y2="15"/>
          </svg>
          <span class="cat-item-label">Swimwear</span>
          <span class="cat-item-count" id="count-swimwear">0</span>
        </a>

        <a class="cat-item" href="category.html?cat=sweaters">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3c1 2 2.5 2.5 4 2.5S15 5 16 3l4 4-3 2.5V21H7V9.5L4 7l4-4z"/>
            <line x1="7" y1="17" x2="17" y2="17"/>
            <line x1="7" y1="19.5" x2="17" y2="19.5"/>
          </svg>
          <span class="cat-item-label">Sweaters</span>
          <span class="cat-item-count" id="count-sweaters">0</span>
        </a>

        <a class="cat-item" href="category.html?cat=hats">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 13Q4 7 12 7Q20 7 20 13H4z"/>
            <line x1="3" y1="13" x2="21" y2="13"/>
            <path d="M20 13Q22 13 22.5 15.5H3.5L3 13"/>
          </svg>
          <span class="cat-item-label">Hats</span>
          <span class="cat-item-count" id="count-hats">0</span>
        </a>

        <a class="cat-item" href="category.html?cat=jewelry">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3L21 9.5 12 21 3 9.5 12 3z"/>
            <line x1="3" y1="9.5" x2="21" y2="9.5"/>
            <line x1="8.5" y1="9.5" x2="12" y2="3"/>
            <line x1="15.5" y1="9.5" x2="12" y2="3"/>
          </svg>
          <span class="cat-item-label">Jewelry</span>
          <span class="cat-item-count" id="count-jewelry">0</span>
        </a>

      </div>
    </section>

  </div>

  <!-- ADD ITEM BUTTON -->
  <div class="add-wrap">
    <button class="add-btn" onclick="openAddModal()">+ Add Item</button>
  </div>

  <!-- ADD ITEM MODAL -->
  <div class="add-modal-backdrop" id="addModal" onclick="closeAddOnBackdrop(event)">
    <div class="add-modal-sheet">
      <div class="am-handle"></div>
      <div class="am-header">
        <div class="am-title">Add Item</div>
        <button class="am-close" onclick="closeAddModal()">✕</button>
      </div>

      <div class="am-photo-zone" id="amPhotoZone" onclick="document.getElementById('amPhotoInput').click()">
        <div class="am-photo-icon">📷</div>
        <div class="am-photo-label">Tap to add a photo</div>
      </div>
      <input type="file" id="amPhotoInput" accept="image/*" capture="environment" style="display:none" onchange="handleAmPhoto(this)">

      <div class="am-row">
        <div class="am-label">Name</div>
        <input class="am-input" id="amName" placeholder="e.g. White linen shirt" type="text">
      </div>

      <div class="am-row">
        <div class="am-label">Brand (optional)</div>
        <input class="am-input" id="amBrand" placeholder="e.g. Zara, Mango, Vintage…" type="text">
      </div>

      <div class="am-row"><div class="am-label">Category</div></div>
      <div class="am-cat-scroll" id="amCatPills"></div>

      <div id="amGarmentSection" style="display:none">
        <div class="am-row"><div class="am-label">Type</div></div>
        <div class="am-pills" id="amGarmentPills"></div>
      </div>

      <div class="am-row"><div class="am-label">Occasion</div></div>
      <div class="am-pills" id="amOccasionPills"></div>

      <div class="am-row"><div class="am-label">Color</div></div>
      <div class="am-swatches" id="amSwatches"></div>

      <div class="am-row">
        <div class="am-label">Notes (optional)</div>
        <textarea class="am-input" id="amNotes" placeholder="Size, where I got it, how I style it…" rows="2"></textarea>
      </div>

      <button class="am-save" onclick="saveAmItem()">Save to Wardrobe</button>
    </div>
  </div>

  <script>
    const ALL_CATS = ['tops','bottoms','dresses','jackets','bags','shoes','activewear','swimwear','sweaters','hats','jewelry'];
    const CAT_LABELS = { tops:'Tops', bottoms:'Bottoms', dresses:'Dresses', jackets:'Jackets', bags:'Bags', shoes:'Shoes', activewear:'Activewear', swimwear:'Swimwear', sweaters:'Sweaters', hats:'Hats', jewelry:'Jewelry' };

    const SVG_SA = `viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"`;
    const CAT_SVG = {
      tops:       `<path d="M8 3c1 2 2.5 2.5 4 2.5S15 5 16 3l4 4-3 2.5V21H7V9.5L4 7l4-4z"/>`,
      bottoms:    `<path d="M5 3h14v8l-4 10h-2.5L12 14l-.5 7H9L5 11V3z"/><line x1="5" y1="7" x2="19" y2="7"/>`,
      dresses:    `<path d="M10 2h4v5l5 14H5l5-14V2z"/><line x1="10" y1="2" x2="10" y2="7"/><line x1="14" y1="2" x2="14" y2="7"/><line x1="9" y1="9" x2="15" y2="9"/>`,
      jackets:    `<path d="M4 7l4-4 3 4 1-2 1 2 3-4 4 4-2 3V21H6V10L4 7z"/><line x1="12" y1="5" x2="12" y2="16"/>`,
      bags:       `<rect x="5" y="9" width="14" height="12" rx="2"/><path d="M9 9C9 7 10 5 12 5s3 2 3 4"/>`,
      shoes:      `<path d="M3 16Q3 10 9 9h7Q21 9 21 13v3Q13.5 18 3 16z"/><line x1="2" y1="16" x2="22" y2="16"/><path d="M9 9V7h4v2"/>`,
      activewear: `<path d="M13.5 2L8 13h4L9.5 22 17 11h-4.5L13.5 2z"/>`,
      swimwear:   `<path d="M6.5 6Q12 3 17.5 6l-1 5h-10l-1-5z"/><path d="M7.5 15Q12 12.5 16.5 15l-1 5.5h-8L7.5 15z"/><line x1="7.5" y1="11" x2="7.5" y2="15"/><line x1="16.5" y1="11" x2="16.5" y2="15"/>`,
      sweaters:   `<path d="M8 3c1 2 2.5 2.5 4 2.5S15 5 16 3l4 4-3 2.5V21H7V9.5L4 7l4-4z"/><line x1="7" y1="17" x2="17" y2="17"/><line x1="7" y1="19.5" x2="17" y2="19.5"/>`,
      hats:       `<path d="M4 13Q4 7 12 7Q20 7 20 13H4z"/><line x1="3" y1="13" x2="21" y2="13"/><path d="M20 13Q22 13 22.5 15.5H3.5L3 13"/>`,
      jewelry:    `<path d="M12 3L21 9.5 12 21 3 9.5 12 3z"/><line x1="3" y1="9.5" x2="21" y2="9.5"/><line x1="8.5" y1="9.5" x2="12" y2="3"/><line x1="15.5" y1="9.5" x2="12" y2="3"/>`,
    };

    const PALETTE = [
      { name:'black', hex:'#1c1c1c' }, { name:'white',  hex:'#f0f0f0' },
      { name:'grey',  hex:'#9e9e9e' }, { name:'navy',   hex:'#1a2744' },
      { name:'blue',  hex:'#4a7fcb' }, { name:'green',  hex:'#4a7d60' },
      { name:'olive', hex:'#7a7c45' }, { name:'brown',  hex:'#8c6030' },
      { name:'tan',   hex:'#c8a060' }, { name:'red',    hex:'#c03050' },
      { name:'pink',  hex:'#e07090' }, { name:'purple', hex:'#7a4a8a' },
    ];
    const LIGHT_COLORS = new Set(['white','tan','pink']);

    const STYLE_FILTERS    = ['Casual', 'Going Out', 'Work'];
    const CAT_TYPE_FILTERS = { tops: ['T-Shirt', 'Tank Top', 'Long Sleeve'] };

    // ── Count tallying ──────────────────────────────────────
    function refreshCounts() {
      let total = 0;
      ALL_CATS.forEach(k => {
        let count = 0;
        try { count = (JSON.parse(localStorage.getItem('wardrobe_' + k)) || []).length; } catch(e) {}
        total += count;
        const el = document.getElementById('count-' + k);
        if (el) el.textContent = count > 0 ? count + ' item' + (count !== 1 ? 's' : '') : '';
      });
      document.getElementById('total-items').textContent = total;
    }
    refreshCounts();

    // ── Add Item Modal ───────────────────────────────────────
    let amCat = null, amGarmentType = null, amStyle = null, amColor = null, amPhoto = null;

    function openAddModal() {
      amCat = null; amGarmentType = null; amStyle = null; amColor = null; amPhoto = null;

      document.getElementById('amName').value  = '';
      document.getElementById('amBrand').value = '';
      document.getElementById('amNotes').value = '';
      document.getElementById('amPhotoInput').value = '';
      document.getElementById('amPhotoZone').innerHTML =
        '<div class="am-photo-icon">📷</div><div class="am-photo-label">Tap to add a photo</div>';

      // Category pills
      const catRow = document.getElementById('amCatPills');
      catRow.innerHTML = '';
      ALL_CATS.forEach(k => {
        const b = document.createElement('button');
        b.className = 'am-pill'; b.id = 'amCatPill-' + k;
        b.textContent = CAT_LABELS[k];
        b.onclick = () => selectAddCat(k);
        catRow.appendChild(b);
      });

      // Garment section hidden until category chosen
      document.getElementById('amGarmentSection').style.display = 'none';

      // Occasion pills
      const oRow = document.getElementById('amOccasionPills');
      oRow.innerHTML = '';
      STYLE_FILTERS.forEach(f => {
        const b = document.createElement('button');
        b.className = 'am-pill'; b.textContent = f;
        b.onclick = () => {
          amStyle = amStyle === f ? null : f;
          oRow.querySelectorAll('.am-pill').forEach(p => p.classList.remove('selected'));
          if (amStyle) b.classList.add('selected');
        };
        oRow.appendChild(b);
      });

      // Color swatches
      const sRow = document.getElementById('amSwatches');
      sRow.innerHTML = '';
      PALETTE.forEach(c => {
        const sw = document.createElement('div');
        sw.className = 'am-swatch';
        sw.style.background = c.hex;
        if (LIGHT_COLORS.has(c.name)) sw.style.boxShadow = 'inset 0 0 0 1.5px rgba(0,0,0,0.18)';
        sw.title = c.name;
        sw.onclick = () => {
          amColor = amColor === c.name ? null : c.name;
          sRow.querySelectorAll('.am-swatch').forEach(s => s.classList.remove('selected'));
          if (amColor) sw.classList.add('selected');
        };
        sRow.appendChild(sw);
      });

      document.getElementById('addModal').classList.add('open');
    }

    function selectAddCat(k) {
      amCat = k; amGarmentType = null;
      document.querySelectorAll('#amCatPills .am-pill').forEach(p => p.classList.remove('selected'));
      document.getElementById('amCatPill-' + k).classList.add('selected');

      const types = CAT_TYPE_FILTERS[k];
      const gSection = document.getElementById('amGarmentSection');
      gSection.style.display = types ? '' : 'none';
      if (types) {
        const row = document.getElementById('amGarmentPills');
        row.innerHTML = '';
        types.forEach(t => {
          const b = document.createElement('button');
          b.className = 'am-pill'; b.textContent = t;
          b.onclick = () => {
            amGarmentType = amGarmentType === t ? null : t;
            row.querySelectorAll('.am-pill').forEach(p => p.classList.remove('selected'));
            if (amGarmentType) b.classList.add('selected');
          };
          row.appendChild(b);
        });
      }
    }

    function handleAmPhoto(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        amPhoto = e.target.result;
        const zone = document.getElementById('amPhotoZone');
        zone.innerHTML = '';
        const img = document.createElement('img'); img.src = amPhoto;
        zone.appendChild(img);
      };
      reader.readAsDataURL(file);
    }

    function saveAmItem() {
      if (!amCat) {
        const catRow = document.getElementById('amCatPills');
        catRow.style.outline = '2px solid #e45a33';
        catRow.style.borderRadius = '8px';
        setTimeout(() => { catRow.style.outline = ''; catRow.style.borderRadius = ''; }, 1500);
        return;
      }
      const name = document.getElementById('amName').value.trim();
      if (!name) {
        const inp = document.getElementById('amName');
        inp.focus(); inp.style.outline = '2px solid #e45a33';
        setTimeout(() => inp.style.outline = '', 1500);
        return;
      }
      const key = 'wardrobe_' + amCat;
      let items = [];
      try { items = JSON.parse(localStorage.getItem(key)) || []; } catch(e) {}
      items.unshift({
        id:          Date.now().toString(),
        name,
        brand:       document.getElementById('amBrand').value.trim(),
        garmentType: amGarmentType,
        style:       amStyle,
        color:       amColor,
        notes:       document.getElementById('amNotes').value.trim(),
        photo:       amPhoto,
        addedAt:     new Date().toISOString(),
      });
      localStorage.setItem(key, JSON.stringify(items));
      closeAddModal();
      refreshCounts();
    }

    function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }
    function closeAddOnBackdrop(e) { if (e.target === document.getElementById('addModal')) closeAddModal(); }
  </script>

</body>
</html>
